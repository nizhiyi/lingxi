name: 编译 Windows 客户端

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          path: .
          fetch-depth: 0  # 改为 0 以拉取全部分支历史，方便恢复文件

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # 🆕 新增：强制恢复缺失的文件
      - name: 强制恢复缺失的 electron/package.json
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- electron/package.json
          echo "======== 检查恢复的文件 ========"
          ls -l electron/package.json
          echo "======== 内容开头 ========"
          head -n 10 electron/package.json
        shell: bash

      - name: 编译 Windows 客户端
        run: |
          cd backend-desktop
          go mod tidy
          cd ..
          chmod +x ./build-desktop.sh
          ./build-desktop.sh win
        shell: bash

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-windows-client
          path: dist-electron/*.exe
