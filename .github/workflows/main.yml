name: 编译 Windows 客户端

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # 1. 检出代码：注意去掉了 path: lingxi，这样代码会直接拉取到项目根目录
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 安装 Node.js (>= 20.19)
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. 安装 Go (>= 1.24)
      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # 4. 执行构建脚本
      - name: 编译 Windows 客户端
        # 注意：先 cd 到 lingxi 目录，再执行脚本
        # 因为 GitHub 默认下载到了 lingxi 文件夹里
        shell: bash
        run: |
          cd lingxi
          # 进入后端目录刷新 go mod
          cd backend-desktop
          go mod tidy
          cd ..
          # 赋予脚本执行权限并构建
          chmod +x ./build-desktop.sh
          ./build-desktop.sh win

      # 5. 上传编译好的文件
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-windows-client
          path: lingxi/dist-electron/*.exe
