name: 在 Windows 上构建 Windows 版

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest        # 改为 Windows 运行器

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: 执行 Windows 版构建脚本
        env:
          GOOS: windows
          GOARCH: amd64
          NPM_CONFIG_CACHE: /tmp/npm_cache
        run: |
          # 创建 npm 缓存文件夹
          mkdir -p $env:NPM_CONFIG_CACHE   # PowerShell 语法，与 Git Bash 兼容
          # 使用 bash 运行原有的 shell 脚本
          bash ./build-desktop.sh win

      - name: 上传 Windows 安装包产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-zip
          path: |
            dist-electron/灵犀 Setup*.exe
