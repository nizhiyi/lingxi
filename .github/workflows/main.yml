name: 编译 Windows 客户端

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          path: .

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # ⚠️ 核心修复：修改 build-desktop.sh 中的路径逻辑
      - name: 修复 build-desktop.sh 路径错误
        run: |
          sed -i 's|ELECTRON_DIR=$(dirname "$(realpath "$0")")/electron|ELECTRON_DIR="./electron"|g' build-desktop.sh
          cat build-desktop.sh | grep ELECTRON_DIR

      # ✅ 现在可以放心构建
      - name: 编译 Windows 客户端
        run: |
          cd backend-desktop
          go mod tidy
          cd ..
          chmod +x ./build-desktop.sh
          ./build-desktop.sh win
        shell: bash

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-windows-client
          path: dist-electron/*.exe
