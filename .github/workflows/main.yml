name: 编译 Windows 客户端

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          path: .

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # ✅ 关键修复：直接手动构建，绕过有问题的 build-desktop.sh
      - name: 构建后端
        run: |
          cd backend-desktop
          go mod tidy
          go build -o ../backend-desktop.exe
        shell: bash

      - name: 构建前端
        run: |
          cd frontend-desktop
          npm install
          npm run build
        shell: bash

      - name: 构建 Windows 客户端 (Electron)
        run: |
          # 回到根目录
          cd ..
          # 安装 root 依赖 (包括 electron-builder)
          npm install
          # 执行构建 Windows 安装包
          npm run dist:win
        shell: bash

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-windows-client
          path: dist-electron/*.exe
