name: 编译 Windows 客户端

on:
  workflow_dispatch:  # 手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # 1. 检出代码：path: . 确保代码直接放在 D:\a\lingxi\lingxi，避免额外嵌套
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          path: .

      # 2. 安装 Node.js (>= 20.19)
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. 安装 Go (>= 1.24)
      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # 4. 编译 Windows 客户端（去掉了 cd lingxi）
      - name: 编译 Windows 客户端
        run: |
          # 进入后端目录刷新 go mod
          cd backend-desktop
          go mod tidy
          cd ..

          # 给予执行权限并开始构建
          chmod +x ./build-desktop.sh
          ./build-desktop.sh win
        shell: bash

      # 5. 上传生成的 .exe 文件
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-windows-client
          # 最终产物路径在 dist-electron 下
          path: dist-electron/*.exe
