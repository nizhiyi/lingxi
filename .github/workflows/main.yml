name: 编译 Windows 客户端

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          path: . # 确保代码在 D:\a\lingxi\lingxi

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # 步骤 1：构建后端
      - name: 构建后端
        run: |
          cd backend-desktop
          go mod tidy
          go build -o ../backend-desktop.exe
        shell: bash
        # 此时目录停留在 backend-desktop，但 Go 生成的文件在上级目录

      # 步骤 2：构建前端
      - name: 构建前端
        run: |
          cd frontend-desktop
          npm install
          npm run build
        shell: bash
        # 此时目录停留在 frontend-desktop

      # ✅ 步骤 3：构建 Windows 客户端 (Electron) - 已修复
      - name: 构建 Windows 客户端 (Electron)
        run: |
          # 不要写 cd ..，因为此时目录仍然是 D:\a\lingxi\lingxi
          # 先回到项目根目录，确保 package.json 能被找到
          cd D:/a/lingxi/lingxi
          
          # 安装根目录依赖 (包含 electron-builder)
          npm install
          
          # 执行构建 Windows 安装包
          npm run dist:win
        shell: bash

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-windows-client
          path: dist-electron/*.exe
